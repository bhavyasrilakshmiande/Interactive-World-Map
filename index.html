<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive World Population Census</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:white;
}

#map{
    width:95%;
    max-width:1000px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#info{
    background:white;
    max-width:800px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#info img{
    width:120px;
    margin:10px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

button{
    background:#2196f3;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ff5722;
}
</style>
</head>
<body>

<h1>🌍 Interactive World Population Census</h1>

<img id="map"
src="https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular-projection.jpg"
alt="World Map">

<div id="info">
<h2>Select a Country</h2>
<p>Click any country button below</p>
</div>

<div class="buttons">

<button onclick="showInfo('India','1.43 Billion','New Delhi','Asia','https://flagcdn.com/w320/in.png')">India</button>

<button onclick="showInfo('USA','340 Million','Washington D.C.','North America','https://flagcdn.com/w320/us.png')">USA</button>

<button onclick="showInfo('China','1.41 Billion','Beijing','Asia','https://flagcdn.com/w320/cn.png')">China</button>

<button onclick="showInfo('Brazil','216 Million','Brasilia','South America','https://flagcdn.com/w320/br.png')">Brazil</button>

<button onclick="showInfo('Japan','124 Million','Tokyo','Asia','https://flagcdn.com/w320/jp.png')">Japan</button>

<button onclick="showInfo('Germany','84 Million','Berlin','Europe','https://flagcdn.com/w320/de.png')">Germany</button>

<button onclick="showInfo('Australia','27 Million','Canberra','Australia','https://flagcdn.com/w320/au.png')">Australia</button>

<button onclick="showInfo('Canada','40 Million','Ottawa','North America','https://flagcdn.com/w320/ca.png')">Canada</button>

<button onclick="showInfo('Pakistan','241 Million','Islamabad','Asia','https://flagcdn.com/w320/pk.png')">Pakistan</button>

<button onclick="showInfo('Bangladesh','173 Million','Dhaka','Asia','https://flagcdn.com/w320/bd.png')">Bangladesh</button>

<button onclick="showInfo('Nigeria','223 Million','Abuja','Africa','https://flagcdn.com/w320/ng.png')">Nigeria</button>

<button onclick="showInfo('South Africa','62 Million','Pretoria','Africa','https://flagcdn.com/w320/za.png')">South Africa</button>

</div>

<script>
function showInfo(country,population,capital,continent,flag){

document.getElementById("info").innerHTML = `
<h2>${country}</h2>
<img src="${flag}" alt="${country}">
<p><b>Population:</b> ${population}</p>
<p><b>Capital:</b> ${capital}</p>
<p><b>Continent:</b> ${continent}</p>
`;

}
</script>

</body>
</html>
